services:
  postgres:
    image: postgres:16-alpine
    container_name: gamingplatform-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gamingplatform}
      POSTGRES_USER: ${POSTGRES_USER:-gamingplatform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gamingplatform}
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gamingplatform} -d ${POSTGRES_DB:-gamingplatform}"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    container_name: gamingplatform-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 8080
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-postgres}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-gamingplatform}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-gamingplatform}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-gamingplatform}
      APP_AI_PROVIDER: ${APP_AI_PROVIDER:-local}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgres_data:
