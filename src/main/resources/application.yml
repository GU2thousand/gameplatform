spring:
  application:
    name: ai-gamified-career-platform
  datasource:
    url: jdbc:h2:mem:gamingplatform;MODE=MYSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    org.springframework.web: INFO

app:
  ai:
    provider: ${APP_AI_PROVIDER:local}
    langchain4j:
      openai:
        api-key: ${OPENAI_API_KEY:}
        base-url: ${OPENAI_BASE_URL:}
        model-name: ${OPENAI_MODEL:gpt-4o-mini}
        temperature: ${OPENAI_TEMPERATURE:0.2}
        timeout-seconds: ${OPENAI_TIMEOUT_SECONDS:60}
        max-retries: ${OPENAI_MAX_RETRIES:2}
        log-requests: ${OPENAI_LOG_REQUESTS:false}
        log-responses: ${OPENAI_LOG_RESPONSES:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
